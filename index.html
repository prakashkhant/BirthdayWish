<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Happy Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Floating Balls */

.balloon{
    position:absolute;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 12s infinite linear;
    opacity:.9;
}

.balloon::after{
    content:'';
    position:absolute;
    width:2px;
    height:90px;
    background:white;
    left:50%;
    top:90px;
}

.ball1{
    left:10%;
    background:#ff4d6d;
    animation-duration:10s;
}

.ball2{
    left:30%;
    background:#ffd166;
    animation-duration:13s;
}

.ball3{
    left:50%;
    background:#06d6a0;
    animation-duration:11s;
}

.ball4{
    left:70%;
    background:#4cc9f0;
    animation-duration:14s;
}

.ball5{
    left:85%;
    background:#c77dff;
    animation-duration:12s;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Main Card */

.card{
    width:90%;
    max-width:700px;
    padding:50px 30px;
    text-align:center;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 30px rgba(255,255,255,0.1);
    z-index:10;
}

h1{
    font-size:70px;
    color:white;
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff4d6d;
    }
    to{
        text-shadow:
        0 0 20px #ff4d6d,
        0 0 40px #ff4d6d,
        0 0 60px #ff4d6d;
    }
}

.name{
    font-size:45px;
    color:#ffd166;
    margin-bottom:20px;
}

.message{
    color:#e5e7eb;
    font-size:20px;
    line-height:1.7;
    margin-bottom:35px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff758f;
}

/* Confetti */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Mobile */

@media(max-width:600px){

    h1{
        font-size:45px;
    }

    .name{
        font-size:30px;
    }

    .message{
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="balloon ball1"></div>
<div class="balloon ball2"></div>
<div class="balloon ball3"></div>
<div class="balloon ball4"></div>
<div class="balloon ball5"></div>

<div class="card">

    <h1>🎉 Happy Birthday 🎂</h1>

    <div class="name">Dear Friend</div>

    <div class="message">
        Wishing you happiness, success, love, and lots of beautiful moments in your life.
        May your special day be full of joy and smiles!
    </div>

   <button onclick="openPage()">
    Open Memories ❤️
</button>

</div>

<script>

function showWish(){

    alert("✨ Have an Amazing Birthday! ✨");

    createConfetti();
}

function createConfetti(){

    for(let i=0;i<150;i++){

        let confetti=document.createElement("div");

        confetti.classList.add("confetti");

        document.body.appendChild(confetti);

        let colors=[
            "#ff4d6d",
            "#ffd166",
            "#06d6a0",
            "#4cc9f0",
            "#c77dff",
            "#ffffff"
        ];

        confetti.style.background=
            colors[Math.floor(Math.random()*colors.length)];

        confetti.style.left=Math.random()*100+"vw";

        confetti.style.width=
            Math.random()*10+5+"px";

        confetti.style.height=
            Math.random()*10+5+"px";

        confetti.style.animationDuration=
            Math.random()*3+2+"s";

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

function openPage(){

    window.location.href = "memories.html";

}


</script>

</body>
</html>
